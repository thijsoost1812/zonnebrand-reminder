name: Zonnebrand en Regen Check

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  check-uv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Controleer UV-index en neerslag, stuur e-mails
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_TOKEN: ${{ secrets.SMTP_TOKEN }}
        run: |
          TODAY=$(TZ=Europe/Amsterdam date +%Y-%m-%d)

          curl -s "https://api.open-meteo.com/v1/forecast?latitude=53.2194&longitude=6.5665&hourly=uv_index,precipitation&timezone=Europe%2FAmsterdam&forecast_days=1" > /tmp/uv_response.json

          RESULT=$(python3 check_uv.py "$TODAY")
          MAX_UV=$(echo "$RESULT" | sed -n '1p')
          MAX_RAIN=$(echo "$RESULT" | sed -n '2p')

          echo "Max UV vandaag: $MAX_UV"
          echo "Max neerslag vandaag: ${MAX_RAIN}mm/u"

          UV_HOOG=$(python3 -c "import sys; sys.exit(0 if float('$MAX_UV') >= 6 else 1)" && echo "ja" || echo "nee")
          REGEN=$(python3 -c "import sys; sys.exit(0 if float('$MAX_RAIN') >= 2 else 1)" && echo "ja" || echo "nee")

          if [ "$UV_HOOG" = "ja" ] && [ "$REGEN" = "ja" ]; then
            ONDERWERP="Zonnebrand én paraplu nodig vandaag!"
            INHOUD="Goedemorgen, Thijs!\n\nVandaag is er van alles aan de hand in Groningen:\n\n☀️  UV-index: ${MAX_UV} — vergeet je zonnebrand niet (SPF 30+).\n🌧️  Regen verwacht: max ${MAX_RAIN}mm per uur — neem een paraplu mee!\n\nFijne dag!"
          elif [ "$UV_HOOG" = "ja" ]; then
            ONDERWERP="Zonnebrand nodig vandaag! UV-index: ${MAX_UV}"
            INHOUD="Goedemorgen, Thijs!\n\nVandaag wordt de maximale UV-index in Groningen ${MAX_UV}.\nVergeet niet om zonnebrand op te doen voor je naar buiten gaat!\n\nSPF 30 of hoger wordt aangeraden bij UV 6+.\n\nFijne dag!"
          elif [ "$REGEN" = "ja" ]; then
            ONDERWERP="Neem een paraplu mee vandaag!"
            INHOUD="Goedemorgen, Thijs!\n\nVandaag wordt er echte regen verwacht in Groningen (max ${MAX_RAIN}mm per uur).\nVergeet je paraplu niet!\n\nFijne dag!"
          else
            echo "Geen meldingen nodig vandaag."
            exit 0
          fi

          printf "Date: $(date -R)\r\nFrom: ${SMTP_USER}\r\nTo: ${SMTP_USER}\r\nSubject: ${ONDERWERP}\r\nContent-Type: text/plain; charset=utf-8\r\n\r\n$(printf "$INHOUD")\r\n" > /tmp/email.txt

          curl --url "smtp://smtp.protonmail.ch:587" \
            --ssl-reqd \
            --user "${SMTP_USER}:${SMTP_TOKEN}" \
            --mail-from "${SMTP_USER}" \
            --mail-rcpt "${SMTP_USER}" \
            --upload-file /tmp/email.txt \
            --silent --show-error

          echo "E-mail verstuurd: ${ONDERWERP}"
