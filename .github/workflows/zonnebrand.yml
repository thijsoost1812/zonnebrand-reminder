name: Zonnebrand en Regen Check

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  check-uv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Controleer UV-index en neerslag, stuur e-mails
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_TOKEN: ${{ secrets.SMTP_TOKEN }}
        run: |
          TODAY=$(TZ=Europe/Amsterdam date +%Y-%m-%d)

          curl -s "https://api.open-meteo.com/v1/forecast?latitude=53.2194&longitude=6.5665&hourly=uv_index,precipitation&timezone=Europe%2FAmsterdam&forecast_days=1" > /tmp/uv_response.json

          RESULT=$(python3 check_uv.py "$TODAY")
          MAX_UV=$(echo "$RESULT" | sed -n '1p')
          MAX_RAIN=$(echo "$RESULT" | sed -n '2p')

          echo "Max UV vandaag: $MAX_UV"
          echo "Max neerslag vandaag: ${MAX_RAIN}mm/u"

          # Zonnebrand-melding bij UV >= 6
          if python3 -c "import sys; sys.exit(0 if float('$MAX_UV') >= 6 else 1)"; then
            printf "Date: $(date -R)\r\nFrom: ${SMTP_USER}\r\nTo: ${SMTP_USER}\r\nSubject: Zonnebrand nodig vandaag! UV-index: ${MAX_UV}\r\nContent-Type: text/plain; charset=utf-8\r\n\r\nGoedemorgen!\r\n\r\nVandaag wordt de maximale UV-index in Groningen ${MAX_UV}.\r\nVergeet niet om zonnebrand op te doen voor je naar buiten gaat!\r\n\r\nSPF 30 of hoger wordt aangeraden bij UV 6+.\r\n\r\nFijne dag!\r\n" > /tmp/email_uv.txt

            curl --url "smtp://smtp.protonmail.ch:587" \
              --ssl-reqd \
              --user "${SMTP_USER}:${SMTP_TOKEN}" \
              --mail-from "${SMTP_USER}" \
              --mail-rcpt "${SMTP_USER}" \
              --upload-file /tmp/email_uv.txt \
              --silent --show-error

            echo "Zonnebrand e-mail verstuurd!"
          else
            echo "Geen zonnebrand-melding nodig (UV te laag)."
          fi

          # Paraplu-melding bij neerslag >= 2mm/u
          if python3 -c "import sys; sys.exit(0 if float('$MAX_RAIN') >= 2 else 1)"; then
            printf "Date: $(date -R)\r\nFrom: ${SMTP_USER}\r\nTo: ${SMTP_USER}\r\nSubject: Neem een paraplu mee vandaag! Regen verwacht in Groningen\r\nContent-Type: text/plain; charset=utf-8\r\n\r\nGoedemorgen!\r\n\r\nVandaag wordt er echte regen verwacht in Groningen (max ${MAX_RAIN}mm per uur).\r\nVergeet je paraplu niet!\r\n\r\nFijne dag!\r\n" > /tmp/email_regen.txt

            curl --url "smtp://smtp.protonmail.ch:587" \
              --ssl-reqd \
              --user "${SMTP_USER}:${SMTP_TOKEN}" \
              --mail-from "${SMTP_USER}" \
              --mail-rcpt "${SMTP_USER}" \
              --upload-file /tmp/email_regen.txt \
              --silent --show-error

            echo "Paraplu e-mail verstuurd!"
          else
            echo "Geen paraplu-melding nodig (geen zware regen verwacht)."
          fi
